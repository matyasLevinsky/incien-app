name: Deploy Shinylive App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive", repos = "https://cloud.r-project.org")'

      - name: Export app
        run: Rscript -e 'shinylive::export("app/", "docs/")'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
