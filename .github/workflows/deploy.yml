name: Deploy Shinylive App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install shinylive and the app's R packages
        run: Rscript -e 'install.packages(c("shinylive", "shiny", "bslib", "DT", "ggplot2", "dplyr", "shinyjs"))'

      - name: Export app
        run: Rscript -e 'shinylive::export("app/", "docs/")'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
